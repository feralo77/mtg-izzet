name: Actualizar registro (diario)

# Baja los resultados de la hoja del Drive una vez al día y actualiza registro.csv,
# que es lo que lee el dashboard. También se puede lanzar a mano desde la pestaña Actions.
#
# Requisito para que tire: la hoja tiene que ser accesible sin login.
#   Opción recomendada: Archivo -> Compartir -> Publicar en la web -> CSV, y pegar esa URL
#   en un "Repository variable" llamado SHEET_CSV_URL (Settings -> Secrets and variables ->
#   Actions -> Variables). Mientras no exista o la hoja no sea pública, el job no falla:
#   simplemente deja registro.csv como está.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC cada día
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: actualizar-registro
  cancel-in-progress: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bajar la hoja y regenerar registro.csv
        env:
          SHEET_CSV_URL: ${{ vars.SHEET_CSV_URL }}
        run: node scripts/actualizar_registro.mjs

      - name: Commitear si hay cambios
        run: |
          if [[ -n "$(git status --porcelain registro.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add registro.csv
            git commit -m "Datos: actualización automática de registro.csv"
            git push
            echo "registro.csv actualizado y subido."
          else
            echo "Sin cambios en registro.csv."
          fi
